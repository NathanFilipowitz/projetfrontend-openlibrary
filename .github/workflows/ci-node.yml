name: CI - Node.js

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Étape 1 : Récupérer le code
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      # Étape 2 : Installer Node.js 18
      - name: 📦 Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # Étape 3 : Installer les dépendances
      - name: 📚 Installer dépendances
        run: npm ci || echo "npm install (pas de package-lock.json)"
      
      # Étape 4 : Lancer les tests
      - name: 🧪 Lancer les tests
        run: npm test || echo "Running tests... (pas de tests configurés)"
      
      # Étape 5 : Builder le projet (Vite)
      - name: 🏗️ Builder le projet
        run: npm run build
      
      # Étape 6 : Vérifier les artefacts
      - name: ✅ Vérifier la build
        run: |
          if [ -d "dist" ]; then
            echo "✓ Build réussie!"
            ls -la dist/
          else
            echo "✗ Erreur: dossier 'dist' introuvable"
            exit 1
          fi
